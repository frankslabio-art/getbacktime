# Frank Hermes — VPS Connection Config
# Fill in YOUR_VPS_IP before first use

[connection]
host     = YOUR_VPS_IP
user     = root
port     = 22
key      = ~/.ssh/id_ed25519      # update to your actual key path

[identity]
agent    = frank-hermes
project  = Getbacktime

[notes]
# SSH command:  ssh -i ~/.ssh/id_ed25519 -p 22 root@YOUR_VPS_IP
# Copy files:   scp -i ~/.ssh/id_ed25519 <file> root@YOUR_VPS_IP:/path/
